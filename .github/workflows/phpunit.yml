name: PHPUnit

on: [push]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Composer
      uses: php-actions/composer@v6

    - name: Set up MySQL
      uses: mirromutth/mysql-action@v1.1
      with:
        mysql root password: root
        mysql database: wordpress_test

    - name: Set up WP and its test suite, and run phpunit
      run: |
        bash tests/install-wp-tests.sh wordpress_test root root localhost latest true $RUNNER_TEMP
        WP_TESTS_DIR=$RUNNER_TEMP/wordpress-tests-lib
        WP_CORE_DIR=$RUNNER_TEMP/wordpress
		cp $WP_TESTS_DIR/wp-tests-config-sample.php $WP_TESTS_DIR/wp-tests-config.php
        sed -i "s:dirname( __FILE__ ) . '/wordpress/':'$WP_CORE_DIR':" $WP_TESTS_DIR/wp-tests-config.php
        sed -i "s/youremptytestdbnamehere/wordpress_test/" $WP_TESTS_DIR/wp-tests-config.php
        sed -i "s/yourusernamehere/root/" $WP_TESTS_DIR/wp-tests-config.php
        sed -i "s/yourpasswordhere/root/" $WP_TESTS_DIR/wp-tests-config.php
        ./vendor/bin/phpunit
